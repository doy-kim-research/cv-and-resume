name: Render and Deploy CV

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true    # uses Posit's server; installs pre-compiled binaries
                                   # avoids system-library failures that broke the first run

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "rmarkdown", "knitr",
            "vitae", "tidyverse",
            "glue", "readr", "RefManageR",
            "tinytex"
          ))'

      - name: Install TinyTeX and LaTeX packages
        run: |
          Rscript -e 'tinytex::install_tinytex()'
          Rscript -e 'tinytex::tlmgr_install(c(
            "fontawesome5", "tcolorbox", "pgf",
            "environ", "trimspaces", "etoolbox",
            "unicode-math", "ucharcat"
          ))'

      - name: Render CV
        run: Rscript -e 'rmarkdown::render("cv.Rmd", output_file = "cv.pdf")'

      - name: Move PDF to docs/
        run: |
          mkdir -p docs
          cp cv.pdf docs/cv.pdf

      - name: Commit and push rendered PDF
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/cv.pdf
          git diff --staged --quiet || git commit -m "chore: auto-render CV [skip ci]"
          git push
